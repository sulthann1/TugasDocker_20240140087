<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - MY Website 20240140087</title>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            background: #f0f4f9;
            min-height: 100vh;
            padding: 36px 20px;
            color: #202124;
        }
        .container { max-width: 860px; margin: 0 auto; }
        .card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.06);
            padding: 28px 32px;
        }
        .home-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a73e8;
            margin-bottom: 2px;
        }
        .card-subtitle {
            font-size: 12px;
            color: #5f6368;
        }
        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background: #e8f0fe;
            color: #1a73e8;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .15s;
            white-space: nowrap;
        }
        .btn-add:hover { background: #d2e3fc; }
        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #202124;
            margin-bottom: 10px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table thead tr { background: #1a73e8; }
        .data-table th {
            padding: 11px 16px;
            font-weight: 500;
            text-align: center;
            color: #ffffff;
            border: none;
        }
        .data-table td {
            padding: 10px 16px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            color: #202124;
        }
        .data-table tbody tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: #f5f8ff; }
        .empty-row {
            color: #5f6368;
            font-style: italic;
            padding: 22px !important;
        }
        .home-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        .btn-logout {
            font-size: 12px;
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .btn-logout:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="home-header">
            <div>
                <h1 class="card-title">MY Website 20240140087</h1>
                <p class="card-subtitle">Selamat datang di aplikasi!</p>
            </div>
            <a th:href="@{/form}" class="btn-add">+ Input Data Mahasiswa</a>
        </div>

        <p class="section-label">Data Mahasiswa</p>
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Jenis Kelamin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" class="empty-row">Belum ada data</td>
                </tr>
                <tr th:each="user, stat : ${users}">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${user.nama}"></td>
                    <td th:text="${user.nim}"></td>
                    <td th:text="${user.jenisKelamin}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="home-footer">
            <a th:href="@{/logout}" class="btn-logout">Logout</a>
        </div>
    </div>
</div>
</body>
</html>
