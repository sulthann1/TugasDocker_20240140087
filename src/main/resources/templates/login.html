<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MY Website 20240140087</title>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            background: #f0f4f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.06);
            padding: 40px 44px;
            width: 100%;
            max-width: 420px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a73e8;
            margin-bottom: 2px;
        }
        .card-subtitle {
            font-size: 12px;
            color: #5f6368;
            margin-bottom: 28px;
        }
        .alert-error {
            background: #fce8e6;
            border: 1px solid #f5c6cb;
            color: #c62828;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .field-group { margin-bottom: 18px; }
        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #5f6368;
            margin-bottom: 5px;
        }
        .field-group input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            color: #202124;
            background: #fafafa;
            transition: border-color .15s, box-shadow .15s;
        }
        .field-group input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,.12);
            background: #fff;
        }
        .btn-login {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            margin-top: 4px;
        }
        .btn-login:hover { background: #1558b0; }
    </style>
</head>
<body>
<div class="card">
    <h1 class="card-title">Login Page</h1>
    <p class="card-subtitle">MY Website 20240140087</p>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <div class="field-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Masukkan username" required />
        </div>
        <div class="field-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Masukkan password" required />
        </div>
        <button type="submit" class="btn-login">Login</button>
    </form>
</div>
</body>
</html>
