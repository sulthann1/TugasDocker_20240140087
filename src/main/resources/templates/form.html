<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input - MY Website 20240140087</title>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            background: #f0f4f9;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            color: #202124;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.06);
            padding: 40px 44px;
            width: 100%;
            max-width: 480px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a73e8;
            margin-bottom: 2px;
        }
        .card-subtitle {
            font-size: 12px;
            color: #5f6368;
            margin-bottom: 28px;
        }
        .field-group { margin-bottom: 18px; }
        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #5f6368;
            margin-bottom: 5px;
        }
        .field-group input[type="text"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            color: #202124;
            background: #fafafa;
            transition: border-color .15s, box-shadow .15s;
        }
        .field-group input[type="text"]:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,.12);
            background: #fff;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 9px;
            margin-top: 6px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #202124;
            cursor: pointer;
        }
        .radio-label input[type="radio"] {
            accent-color: #1a73e8;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .form-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 26px;
        }
        .btn-submit {
            padding: 9px 26px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-submit:hover { background: #1558b0; }
        .btn-back {
            font-size: 12px;
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .btn-back:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1 class="card-title">Form Input Mahasiswa</h1>
    <p class="card-subtitle">MY Website <!DOCTYPE html>
        <html lang="id" xmlns:th="http://www.thymeleaf.org">

        <body class="center-page">

            <div th:if="${error}" class="alert-error" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="field-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required />
                </div>
                <div class="field-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required />
                </div>
                <button type="submit" class="btn-primary full-width">Login</button>
            </form>
        </div>
        </body>
        </html>
    </p>

    <form th:action="@{/form}" method="post">
        <div class="field-group">
            <label for="nama">Nama:</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required />
        </div>
        <div class="field-group">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" name="nim" placeholder="Masukkan NIM" required />
        </div>
        <div class="field-group">
            <label>Jenis Kelamin:</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="jenisKelamin" value="Laki-laki" required /> Laki-laki
                </label>
                <label class="radio-label">
                    <input type="radio" name="jenisKelamin" value="Perempuan" /> Perempuan
                </label>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-submit">Submit</button>
            <a th:href="@{/home}" class="btn-back">Kembali ke Home</a>
        </div>
    </form>
</div>
</body>
</html>
